<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Employee Discipline Form</title>

  <link rel="apple-touch-icon" href="icon.png">
  <link rel="icon" type="image/png" href="icon.png">

  <meta name="apple-mobile-web-app-title" content="Discipline Form">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0f2f57">

  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #1f2933;
    }

    .card {
      background: white;
      padding: 34px;
      border-radius: 24px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.14);
      max-width: 340px;
      width: 82%;
    }

    .icon-button {
      border: none;
      background: transparent;
      padding: 0;
      cursor: pointer;
    }

    .icon-button img {
      width: 150px;
      height: 150px;
      border-radius: 32px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.18);
      margin-bottom: 20px;
    }

    h1 {
      font-size: 22px;
      margin: 0 0 10px;
    }

    p {
      font-size: 15px;
      color: #52606d;
      margin: 0 0 18px;
    }

    .open-text {
      font-weight: bold;
      color: #0f2f57;
      margin-top: 4px;
    }

    .note {
      font-size: 12px;
      color: #7b8794;
      margin-top: 20px;
    }
  </style>
</head>

<body>
  <div class="card">
    <button class="icon-button" onclick="openForm()" aria-label="Open Employee Discipline Form">
      <img src="icon.png" alt="Employee Discipline Form Icon">
    </button>

    <h1>Employee Discipline Form</h1>
    <p>Tap the icon to open the form.</p>
    <p class="open-text">Open Form</p>

    <p class="note">Add this page to your home screen before opening the form.</p>
  </div>

  <script>
    function openForm() {
      window.location.href = "https://forms.office.com/Pages/ResponsePage.aspx?id=0oJwgH5NfEu1B-9keMtcqpnsWoUqr0ZGkWvqEUbsW0JUMThBWFY5U1dZR01MTFZEWENNREFIV1pJUC4u";
    }
  </script>
</body>
</html>
